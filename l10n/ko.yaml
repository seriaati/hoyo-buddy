devtools_instructions_description: "1. [HoYoLAB](https://www.hoyolab.com/home) 또는 [미요시(중국 서버)](https://www.miyoushe.com/ys/)에 로그인하세요. \n2. F12 또는 Ctrl+Shift+I를 눌러 개발자 도구(DevTools)를 엽니다. \n3. 상단 메뉴의 >> 아이콘을 클릭합니다. \n4. `Application` 탭으로 이동합니다. \n5. 왼쪽 목록에서 `Cookies`를 선택하세요. \n6. 접속 중인 사이트(예: https://www.hoyolab.com)를 클릭합니다. \n7. `Filter` 입력란에 `v2`를 입력합니다. \n8. 아래 버튼을 눌러주세요. \n9. 표시된 각 쿠키의 `Value` 값을 복사해 입력칸에 붙여넣습니다."
